[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://loyorapay.com"
additional_redirect_urls = ["https://loyorapay.com", "http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # disabled for demo — enable in production

[functions.expire-points]
verify_jwt = false   # called by cron, not user JWT

[functions.invite-staff]
verify_jwt = true

[functions.pms-webhook]
verify_jwt = false   # uses X-LoyoraPay-Secret shared secret instead

[functions.send-campaign]
verify_jwt = true
